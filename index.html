<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLOHAND — 3D Gesture Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Share Tech Mono',monospace; cursor:none; }

#threeCanvas { position:fixed; inset:0; z-index:1; }
#handCanvas  { position:fixed; inset:0; z-index:3; pointer-events:none; }

/* ── Scanlines ── */
body::after {
  content:''; position:fixed; inset:0; z-index:99; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* ── Noise grain ── */
body::before {
  content:''; position:fixed; inset:0; z-index:98; pointer-events:none; opacity:.25;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
}

/* ── Corner brackets ── */
.brkt { position:fixed; width:44px; height:44px; z-index:20; border-color:rgba(0,245,255,.35); border-style:solid; }
.brkt.tl { top:18px; left:18px; border-width:2px 0 0 2px; }
.brkt.tr { top:18px; right:18px; border-width:2px 2px 0 0; }
.brkt.bl { bottom:18px; left:18px; border-width:0 0 2px 2px; }
.brkt.br { bottom:18px; right:18px; border-width:0 2px 2px 0; }

/* ── TOP HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 28px;
  background:linear-gradient(to bottom,rgba(0,3,15,.92) 0%,transparent 100%);
  pointer-events:none;
}
.hud-logo {
  font-family:'Orbitron',sans-serif; font-weight:900;
  font-size:1.4rem; letter-spacing:7px;
  color:#00f5ff; text-shadow:0 0 24px rgba(0,245,255,.6);
}
.hud-logo em { color:#ff0090; font-style:normal; text-shadow:0 0 24px rgba(255,0,144,.6); }
.hud-right {
  text-align:right; font-size:.6rem; letter-spacing:2px;
  color:rgba(0,245,255,.5); line-height:2;
}
.hud-right span { color:#00f5ff; }

/* ── GESTURE BADGE ── */
#badge {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  z-index:20; padding:10px 30px; border-radius:40px;
  font-family:'Orbitron',sans-serif; font-size:.68rem; letter-spacing:3px;
  background:rgba(0,3,15,.85); border:1px solid rgba(0,245,255,.35);
  color:#00f5ff; backdrop-filter:blur(12px);
  transition:all .25s; white-space:nowrap;
  box-shadow:0 0 20px rgba(0,245,255,.1);
}
#badge.grab  { color:#ff0090; border-color:rgba(255,0,144,.4); box-shadow:0 0 20px rgba(255,0,144,.15); }
#badge.rot   { color:#7fff00; border-color:rgba(127,255,0,.4);  box-shadow:0 0 20px rgba(127,255,0,.15); }
#badge.pinch { color:#ffaa00; border-color:rgba(255,170,0,.4);  box-shadow:0 0 20px rgba(255,170,0,.15); }

/* ── LEFT PANEL ── */
#leftPanel {
  position:fixed; left:20px; top:50%; transform:translateY(-50%);
  z-index:20; display:flex; flex-direction:column; gap:7px;
}
.panel-lbl { font-size:.52rem; letter-spacing:3px; color:rgba(0,245,255,.35); margin-bottom:3px; }
.obj-btn {
  background:rgba(0,3,15,.8); border:1px solid rgba(0,245,255,.18);
  color:rgba(0,245,255,.5); padding:8px 16px; border-radius:5px;
  font-family:'Share Tech Mono',monospace; font-size:.62rem; letter-spacing:2px;
  cursor:pointer; transition:all .2s; backdrop-filter:blur(8px);
  text-align:left;
}
.obj-btn:hover { border-color:rgba(0,245,255,.6); color:#00f5ff; background:rgba(0,245,255,.07); }
.obj-btn.active {
  border-color:#00f5ff; color:#00f5ff;
  background:rgba(0,245,255,.1);
  box-shadow:0 0 14px rgba(0,245,255,.2);
}
.obj-btn.active::before { content:'▶ '; font-size:.5rem; }
.divider { height:1px; background:rgba(0,245,255,.1); margin:2px 0; }
.reset-btn {
  background:rgba(0,3,15,.8); border:1px solid rgba(255,0,144,.2);
  color:rgba(255,0,144,.6); padding:7px 16px; border-radius:5px;
  font-family:'Share Tech Mono',monospace; font-size:.6rem; letter-spacing:2px;
  cursor:pointer; transition:all .2s; backdrop-filter:blur(8px);
}
.reset-btn:hover { border-color:rgba(255,0,144,.6); color:#ff0090; box-shadow:0 0 12px rgba(255,0,144,.2); }

/* ── RIGHT GUIDE ── */
#guide {
  position:fixed; right:248px; bottom:70px; z-index:20;
  display:flex; flex-direction:column; gap:5px;
}
.guide-row { display:flex; align-items:center; gap:8px; }
.g-ico { font-size:.9rem; width:22px; text-align:center; }
.g-key { font-size:.58rem; letter-spacing:2px; color:rgba(0,245,255,.7); min-width:52px; }
.g-desc { font-size:.58rem; letter-spacing:1px; color:rgba(255,255,255,.3); }

/* ── SELECTED INFO ── */
#selInfo {
  position:fixed; top:72px; left:50%; transform:translateX(-50%);
  z-index:20; text-align:center; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
#selInfo.show { opacity:1; }
#selName {
  font-family:'Orbitron',sans-serif; font-size:.85rem;
  letter-spacing:5px; color:#ff0090;
  text-shadow:0 0 20px rgba(255,0,144,.5);
}
#selCoords { font-size:.55rem; letter-spacing:2px; color:rgba(255,0,144,.45); margin-top:3px; }

/* ── PiP CAMERA ── */
#pip {
  position:fixed; bottom:24px; right:24px; z-index:20;
  width:220px; border-radius:8px; overflow:hidden;
  border:1px solid rgba(0,245,255,.25);
  background:#000310;
  box-shadow:0 0 30px rgba(0,245,255,.15), inset 0 0 20px rgba(0,0,0,.5);
}
#pipCanvas { width:100%; display:block; }
.pip-footer {
  padding:4px 10px; font-size:.55rem; letter-spacing:2px;
  color:rgba(0,245,255,.45); border-top:1px solid rgba(0,245,255,.15);
  display:flex; justify-content:space-between; align-items:center;
}
.pip-dot { width:6px; height:6px; border-radius:50%; background:#444; transition:background .3s; }
.pip-dot.live { background:#7fff00; box-shadow:0 0 6px #7fff00; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:200;
  background:#000310; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:22px;
  transition:opacity .6s;
}
#loading.hide { opacity:0; pointer-events:none; }
.ld-title {
  font-family:'Orbitron',sans-serif; font-weight:900;
  font-size:2.2rem; letter-spacing:10px; color:#00f5ff;
  text-shadow:0 0 40px rgba(0,245,255,.6);
  animation:flicker 3s infinite;
}
@keyframes flicker {
  0%,95%,100%{opacity:1} 96%{opacity:.3} 97%{opacity:1} 98%{opacity:.5} 99%{opacity:1}
}
.ld-sub { font-size:.62rem; letter-spacing:3px; color:rgba(0,245,255,.4); }
.ld-bar { width:280px; height:2px; background:rgba(0,245,255,.1); border-radius:2px; overflow:hidden; }
.ld-inner {
  height:100%; width:0%;
  background:linear-gradient(to right,#00f5ff,#ff0090);
  box-shadow:0 0 10px #00f5ff;
  animation:ld 2.5s ease-out forwards;
}
@keyframes ld { 0%{width:0%} 100%{width:100%} }
.ld-msg { font-size:.6rem; letter-spacing:2px; color:rgba(0,245,255,.3); }

/* ── Custom cursor ── */
#cursor {
  position:fixed; z-index:50; pointer-events:none;
  width:20px; height:20px;
  transform:translate(-50%,-50%);
  transition:transform .1s;
}
#cursor::before, #cursor::after {
  content:''; position:absolute; background:rgba(0,245,255,.7);
}
#cursor::before { left:50%; top:0; width:1px; height:100%; transform:translateX(-50%); }
#cursor::after  { top:50%; left:0; height:1px; width:100%; transform:translateY(-50%); }
</style>
</head>
<body>

<!-- Three.js -->
<canvas id="threeCanvas"></canvas>
<!-- Hand skeleton overlay -->
<canvas id="handCanvas"></canvas>
<!-- Hidden video -->
<video id="video" style="display:none" playsinline autoplay muted></video>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Corner brackets -->
<div class="brkt tl"></div><div class="brkt tr"></div>
<div class="brkt bl"></div><div class="brkt br"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo">HOLO<em>HAND</em></div>
  <div class="hud-right" id="hudInfo">GESTURE: IDLE &nbsp;|&nbsp; FPS: —<br>HAND: <span>SCANNING…</span></div>
</div>

<!-- Selected object info -->
<div id="selInfo"><div id="selName">—</div><div id="selCoords">X: 0.00 · Y: 0.00 · Z: 0.00</div></div>

<!-- Left panel: object list -->
<div id="leftPanel">
  <div class="panel-lbl">// OBJECTS</div>
  <button class="obj-btn active" onclick="selectObj(0)">◈ CUBE</button>
  <button class="obj-btn" onclick="selectObj(1)">◉ SPHERE</button>
  <button class="obj-btn" onclick="selectObj(2)">◎ TORUS</button>
  <button class="obj-btn" onclick="selectObj(3)">◆ CRYSTAL</button>
  <button class="obj-btn" onclick="selectObj(4)">✺ KNOT</button>
  <button class="obj-btn" onclick="selectObj(5)">⬡ GEM</button>
  <div class="divider"></div>
  <button class="reset-btn" onclick="resetSelected()">↺ RESET</button>
</div>

<!-- Gesture guide -->
<div id="guide">
  <div class="guide-row"><span class="g-ico">☝️</span><span class="g-key">POINT</span><span class="g-desc">— Chọn vật thể</span></div>
  <div class="guide-row"><span class="g-ico">✊</span><span class="g-key">FIST</span><span class="g-desc">— Di chuyển XY</span></div>
  <div class="guide-row"><span class="g-ico">✌️</span><span class="g-key">V-SIGN</span><span class="g-desc">— Xoay vật thể</span></div>
  <div class="guide-row"><span class="g-ico">🤏</span><span class="g-key">PINCH</span><span class="g-desc">— Phóng to/thu nhỏ</span></div>
  <div class="guide-row"><span class="g-ico">🖐️</span><span class="g-key">OPEN</span><span class="g-desc">— Thả / nghỉ</span></div>
</div>

<!-- Badge -->
<div id="badge">⬛ IDLE — Giơ tay vào camera</div>

<!-- PiP -->
<div id="pip">
  <canvas id="pipCanvas"></canvas>
  <div class="pip-footer">
    <span id="pipLabel">HAND TRACKING</span>
    <div class="pip-dot" id="pipDot"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="ld-title">HOLOHAND</div>
  <div class="ld-sub">3D GESTURE CONTROL SYSTEM</div>
  <div class="ld-bar"><div class="ld-inner"></div></div>
  <div class="ld-msg" id="ldMsg">LOADING MODELS…</div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ════════════════════════════════════════════════════════
//  THREE.JS SCENE
// ════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('threeCanvas'),
  antialias: true, alpha: false
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000310);
scene.fog = new THREE.FogExp2(0x000310, 0.025);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 120);
camera.position.set(0, 5, 11);
camera.lookAt(0, 1, 0);

// ── Lights ──
scene.add(new THREE.AmbientLight(0x000a20, 3));

const mkLight = (hex, x, y, z, intensity, dist) => {
  const l = new THREE.PointLight(hex, intensity, dist);
  l.position.set(x, y, z);
  scene.add(l); return l;
};
const L1 = mkLight(0x00f5ff, -6, 6, 6, 4, 25);
const L2 = mkLight(0xff0090, 6, 6, 6, 4, 25);
const L3 = mkLight(0x7fff00, 0, 10, -6, 2, 20);
const L4 = mkLight(0xffaa00, 0, 2, 8, 1, 15);

// ── Stars ──
{
  const geo = new THREE.BufferGeometry();
  const n = 3000, p = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) p[i] = (Math.random() - .5) * 100;
  geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0x8899cc, size: .06, transparent: true, opacity: .7
  })));
}

// ── Grid floor ──
const grid = new THREE.GridHelper(40, 40, 0x00f5ff, 0x001530);
grid.position.y = -0.5;
grid.material.opacity = .45;
grid.material.transparent = true;
scene.add(grid);

// ── OBJECTS ──
const OBJ_NAMES   = ['CUBE','SPHERE','TORUS','CRYSTAL','KNOT','GEM'];
const OBJ_COLORS  = [0x00f5ff, 0xff0090, 0x7fff00, 0xffaa00, 0xaa44ff, 0x00ffcc];
const OBJ_GEOS    = [
  new THREE.BoxGeometry(1.3, 1.3, 1.3),
  new THREE.SphereGeometry(.8, 32, 32),
  new THREE.TorusGeometry(.75, .28, 18, 60),
  new THREE.OctahedronGeometry(.85),
  new THREE.TorusKnotGeometry(.65, .22, 120, 18),
  new THREE.IcosahedronGeometry(.85),
];
const OBJ_POSITIONS = [
  [-3.8, 1.2, 0], [-1.4, 1.2, 0], [1.4, 1.2, 0],
  [3.8, 1.2, 0],  [-1.9, 1.2, -3.5], [1.9, 1.2, -3.5]
];

const OBJS = [];

OBJ_GEOS.forEach((geo, i) => {
  const group = new THREE.Group();
  const [x, y, z] = OBJ_POSITIONS[i];
  group.position.set(x, y, z);

  const col = OBJ_COLORS[i];

  // Solid holographic body
  const mat = new THREE.MeshPhongMaterial({
    color: col, emissive: col, emissiveIntensity: .12,
    transparent: true, opacity: .72, shininess: 120,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  group.add(mesh);

  // Inner glow layer
  const innerMat = new THREE.MeshBasicMaterial({
    color: col, transparent: true, opacity: .06, side: THREE.BackSide
  });
  const inner = new THREE.Mesh(geo, innerMat);
  inner.scale.setScalar(1.15);
  group.add(inner);

  // Wireframe
  const wMat = new THREE.MeshBasicMaterial({ color: col, wireframe: true, transparent: true, opacity: .28 });
  const wire = new THREE.Mesh(geo, wMat);
  wire.scale.setScalar(1.03);
  group.add(wire);

  // Selection orbit ring
  const ringGeo = new THREE.TorusGeometry(1.3, .03, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -0.9;
  group.add(ring);

  // Ground glow
  const glowGeo = new THREE.CircleGeometry(.9, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: .07 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.y = -0.48;
  group.add(glow);

  scene.add(group);

  OBJS.push({
    group, mesh, wire, inner, ring, ringMat, mat, wMat,
    color: col, name: OBJ_NAMES[i],
    basePos: new THREE.Vector3(x, y, z),
    floatPhase: Math.random() * Math.PI * 2,
    selected: false,
    hovered: false,
    targetPos: new THREE.Vector3(x, y, z),
    targetScale: 1,
  });
});

// ── Raycaster ──
const raycaster = new THREE.Raycaster();

// ── 3D Cursor ──
const curGeo = new THREE.SphereGeometry(.06, 12, 12);
const curMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0 });
const cursor3D = new THREE.Mesh(curGeo, curMat);
scene.add(cursor3D);

const pulseGeo = new THREE.RingGeometry(.09, .13, 32);
const pulseMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0, side: THREE.DoubleSide });
const pulseRing = new THREE.Mesh(pulseGeo, pulseMat);
scene.add(pulseRing);

// ── Spotlight on selected ──
const spotlight = new THREE.SpotLight(0xffffff, 0, 20, Math.PI / 8, .4, 2);
spotlight.position.set(0, 10, 0);
scene.add(spotlight);
scene.add(spotlight.target);

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let selectedIdx = 0;
let T = 0;
let handVis = false;
let gesture = 'IDLE';
let lastHX = null, lastHY = null, lastHAngle = null, lastPY = null;
let hoverIdx = -1, hoverTimer = null;
let frameN = 0, lastFpsT = performance.now(), fpsVal = 0;

// ════════════════════════════════════════════════════════
//  OBJECT MANAGEMENT
// ════════════════════════════════════════════════════════
function selectObj(i) {
  // Deselect old
  if (selectedIdx >= 0) {
    const o = OBJS[selectedIdx];
    o.selected = false;
    o.ringMat.opacity = 0;
    o.mat.emissiveIntensity = .12;
    o.wMat.opacity = .28;
  }
  selectedIdx = i;
  const o = OBJS[i];
  o.selected = true;
  o.ringMat.opacity = .85;
  o.mat.emissiveIntensity = .5;
  o.wMat.opacity = .65;

  document.querySelectorAll('.obj-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  document.getElementById('selInfo').classList.add('show');
  const hex = '#' + o.color.toString(16).padStart(6,'0');
  document.getElementById('selName').style.color = hex;
  document.getElementById('selName').textContent = o.name;
  document.getElementById('selName').style.textShadow = `0 0 20px ${hex}80`;
}

function resetSelected() {
  if (selectedIdx < 0) return;
  const o = OBJS[selectedIdx];
  o.targetPos.copy(o.basePos);
  o.targetScale = 1;
  o.group.rotation.set(0, 0, 0);
}

selectObj(0);

// ════════════════════════════════════════════════════════
//  GESTURE DETECTION
// ════════════════════════════════════════════════════════
function d3(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}

function classifyGesture(lm) {
  if (!lm || lm.length < 21) return null;

  const indexUp  = lm[8].y  < lm[6].y;
  const middleUp = lm[12].y < lm[10].y;
  const ringUp   = lm[16].y < lm[14].y;
  const pinkyUp  = lm[20].y < lm[18].y;

  const pinchD   = d3(lm[4], lm[8]);
  const pinching = pinchD < .075;

  const cx = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5;
  const cy = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5;
  const dx = lm[9].x - lm[0].x, dy = lm[9].y - lm[0].y;
  const angle  = Math.atan2(dy, dx);
  const tiltZ  = lm[9].z - lm[0].z;

  const isFist  = !indexUp && !middleUp && !ringUp && !pinkyUp;
  const isV     = indexUp && middleUp && !ringUp && !pinkyUp && !pinching;
  const isPoint = indexUp && !middleUp && !ringUp && !pinkyUp && !pinching;
  const isOpen  = indexUp && middleUp && ringUp && pinkyUp;

  let g = 'IDLE';
  if (pinching) g = 'PINCH';
  else if (isFist)  g = 'GRAB';
  else if (isV)     g = 'ROTATE';
  else if (isPoint) g = 'SELECT';
  else if (isOpen)  g = 'OPEN';

  return { g, cx, cy, angle, tiltZ, pinchD, indexTip: lm[8] };
}

// ════════════════════════════════════════════════════════
//  APPLY GESTURE → 3D CONTROL
// ════════════════════════════════════════════════════════
const BADGE_MAP = {
  IDLE:   { t: '⬛ IDLE — Giơ tay vào camera',     cls: '' },
  SELECT: { t: '☝️ POINT — Chỉ để chọn vật thể',  cls: '' },
  GRAB:   { t: '✊ GRAB — Di chuyển vật thể XY',   cls: 'grab' },
  ROTATE: { t: '✌️ V-SIGN — Xoay vật thể',         cls: 'rot' },
  PINCH:  { t: '🤏 PINCH — Phóng to / Thu nhỏ',   cls: 'pinch' },
  OPEN:   { t: '🖐️ OPEN — Thả tay',                cls: '' },
};

function applyGesture(data) {
  if (!data) { updateBadge('IDLE'); return; }
  const { g, cx, cy, angle, tiltZ, indexTip } = data;
  gesture = g;
  updateBadge(g);

  // Update 3D cursor position
  const ndcX = 1 - cx * 2;
  const ndcY = 1 - cy * 2;
  raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.2);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, pt);
  if (pt.length() < 50) {
    cursor3D.position.lerp(pt, .25);
    pulseRing.position.lerp(pt, .25);
    pulseRing.lookAt(camera.position);
  }

  // Cursor color by gesture
  const gcols = { GRAB:0xff0090, ROTATE:0x7fff00, PINCH:0xffaa00, SELECT:0x00f5ff, OPEN:0x00f5ff, IDLE:0x00f5ff };
  curMat.color.setHex(gcols[g] || 0x00f5ff);
  pulseMat.color.setHex(gcols[g] || 0x00f5ff);

  const o = OBJS[selectedIdx];

  // ── SELECT / hover ──
  if (g === 'SELECT') {
    const tipNDC = new THREE.Vector2(1 - indexTip.x * 2, 1 - indexTip.y * 2);
    raycaster.setFromCamera(tipNDC, camera);
    const meshes = OBJS.map(ob => ob.mesh);
    const hits = raycaster.intersectObjects(meshes);

    // Reset hover glow
    OBJS.forEach((ob, j) => { if (!ob.selected) ob.mat.emissiveIntensity = .12; });

    if (hits.length > 0) {
      const hi = meshes.indexOf(hits[0].object);
      if (hi >= 0) {
        OBJS[hi].mat.emissiveIntensity = .55;
        if (hi !== hoverIdx) {
          hoverIdx = hi;
          clearTimeout(hoverTimer);
          hoverTimer = setTimeout(() => { if (hoverIdx === hi) selectObj(hi); }, 700);
        }
      }
    } else {
      clearTimeout(hoverTimer); hoverIdx = -1;
    }
    lastHX = null; lastHY = null; lastHAngle = null; lastPY = null;
    return;
  }

  // ── GRAB → move XY ──
  if (g === 'GRAB') {
    if (lastHX !== null) {
      o.targetPos.x -= (cx - lastHX) * 14;
      o.targetPos.y -= (cy - lastHY) * 9;
    }
    lastHX = cx; lastHY = cy;
    lastHAngle = null; lastPY = null;
    return;
  }

  // ── ROTATE → wrist angle ──
  if (g === 'ROTATE') {
    if (lastHAngle !== null) {
      let delta = angle - lastHAngle;
      if (delta > Math.PI)  delta -= Math.PI * 2;
      if (delta < -Math.PI) delta += Math.PI * 2;
      o.group.rotation.y += delta * 3.5;
      o.group.rotation.x += tiltZ * .8;
    }
    lastHAngle = angle;
    lastHX = null; lastHY = null; lastPY = null;
    return;
  }

  // ── PINCH → scale (hand Y controls scale) ──
  if (g === 'PINCH') {
    if (lastPY !== null) {
      const dy = cy - lastPY;
      const factor = 1 - dy * 7;
      o.targetScale = Math.max(.08, Math.min(4.5, o.targetScale * factor));
    }
    lastPY = cy;
    lastHX = null; lastHY = null; lastHAngle = null;
    return;
  }

  lastHX = null; lastHY = null; lastHAngle = null; lastPY = null;
}

function updateBadge(g) {
  const el = document.getElementById('badge');
  const m = BADGE_MAP[g] || BADGE_MAP.IDLE;
  el.textContent = m.t;
  el.className = m.cls;
  el.id = 'badge';
}

// ════════════════════════════════════════════════════════
//  HAND CANVAS DRAWING
// ════════════════════════════════════════════════════════
const handCanvas = document.getElementById('handCanvas');
const hctx = handCanvas.getContext('2d');
const pipCanvas = document.getElementById('pipCanvas');
const pctx = pipCanvas.getContext('2d');

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [5,6],[6,7],[7,8],[0,5],[5,9],
  [9,10],[10,11],[11,12],[9,13],
  [13,14],[14,15],[15,16],[13,17],
  [17,18],[18,19],[19,20],[0,17]
];
const TIP_COLORS = [
  '#fff','#ff0090','#ff0090','#ff0090','#ff0090',
  '#00f5ff','#00f5ff','#00f5ff','#00f5ff',
  '#7fff00','#7fff00','#7fff00','#7fff00',
  '#ffaa00','#ffaa00','#ffaa00','#ffaa00',
  '#aa44ff','#aa44ff','#aa44ff','#aa44ff'
];

function drawSkeleton(ctx, lm, W, H, pip) {
  const s = pip ? 1 : .25;  // opacity scale
  ctx.shadowBlur = pip ? 6 : 14;

  // Connections
  ctx.lineWidth = pip ? 1.5 : 1.2;
  CONNECTIONS.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(lm[a].x, lm[a].y);
    ctx.lineTo(lm[b].x, lm[b].y);
    ctx.strokeStyle = `rgba(0,245,255,${pip?.8:.22})`;
    ctx.shadowColor = '#00f5ff';
    ctx.stroke();
  });

  // Joints
  lm.forEach((p, i) => {
    const r = i === 0 ? (pip ? 5 : 6) : (pip ? 3 : 5);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = TIP_COLORS[i] || '#fff';
    ctx.shadowColor = TIP_COLORS[i] || '#fff';
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// ════════════════════════════════════════════════════════
//  MEDIAPIPE SETUP
// ════════════════════════════════════════════════════════
const video = document.getElementById('video');

const mp_hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
mp_hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: .7,
  minTrackingConfidence: .65,
});

mp_hands.onResults(results => {
  const lmArr = results.multiHandLandmarks;
  handVis = lmArr && lmArr.length > 0;

  // Draw PiP
  const vw = video.videoWidth || 320, vh = video.videoHeight || 240;
  const pw = 220, ph = Math.round(pw * vh / vw);
  pipCanvas.width = pw; pipCanvas.height = ph;
  pctx.save(); pctx.scale(-1,1); pctx.translate(-pw,0);
  pctx.drawImage(results.image, 0, 0, pw, ph);
  pctx.restore();

  if (lmArr && lmArr.length > 0) {
    const lm = lmArr[0];
    // Scale to PiP (mirrored)
    const sLM = lm.map(p => ({ x:(1-p.x)*pw, y:p.y*ph, z:p.z }));
    drawSkeleton(pctx, sLM, pw, ph, true);

    // Scale to fullscreen (mirrored)
    handCanvas.width  = window.innerWidth;
    handCanvas.height = window.innerHeight;
    hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    const fLM = lm.map(p => ({ x:(1-p.x)*window.innerWidth, y:p.y*window.innerHeight, z:p.z }));
    drawSkeleton(hctx, fLM, window.innerWidth, window.innerHeight, false);

    applyGesture(classifyGesture(lm));
  } else {
    hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    applyGesture(null);
  }

  document.getElementById('pipDot').className = 'pip-dot' + (handVis ? ' live' : '');
  document.getElementById('pipLabel').textContent = handVis ? 'HAND DETECTED' : 'SCANNING…';
});

// Start camera
function startHandTracking() {
  document.getElementById('ldMsg').textContent = 'ACCESSING CAMERA…';
  const mp_cam = new Camera(video, {
    onFrame: async () => { await mp_hands.send({ image: video }); },
    width: 640, height: 480
  });
  const p = mp_cam.start();
  const hide = () => setTimeout(() => document.getElementById('loading').classList.add('hide'), 200);
  if (p && p.then) p.then(hide).catch(hide);
  else setTimeout(hide, 1500);
}
setTimeout(startHandTracking, 2600); // after load bar animation

// ════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  T += .012;

  // Animate lights
  L1.position.set(Math.sin(T*.6)*9, 6, Math.cos(T*.4)*9);
  L2.position.set(Math.cos(T*.5)*9, 6, Math.sin(T*.7)*9);
  L3.position.set(Math.sin(T*.3)*5, 10, -6 + Math.cos(T*.2)*3);

  // Animate objects
  OBJS.forEach((o, i) => {
    if (!o.selected) {
      // Float
      o.group.position.y = o.basePos.y + Math.sin(T + o.floatPhase) * .18;
      // Slow spin
      o.group.rotation.y += .007;
      o.group.rotation.x += i % 2 === 0 ? .003 : -.003;
    } else {
      // Lerp to target
      o.group.position.lerp(o.targetPos, .12);
      const cs = o.group.scale.x;
      const ts = o.targetScale;
      o.group.scale.setScalar(cs + (ts - cs) * .12);

      // Selection ring pulse
      o.ring.rotation.z += .025;
      o.ringMat.opacity = .5 + Math.sin(T * 4) * .35;

      // Spotlight follows
      spotlight.target.position.copy(o.group.position);
      spotlight.position.set(o.group.position.x, o.group.position.y + 8, o.group.position.z + 2);
      spotlight.intensity = 2 + Math.sin(T * 3) * .5;
      spotlight.color.setHex(o.color);

      // Update coords
      const p = o.group.position;
      document.getElementById('selCoords').textContent =
        `X: ${p.x.toFixed(2)} · Y: ${p.y.toFixed(2)} · Z: ${p.z.toFixed(2)} · S: ${o.group.scale.x.toFixed(2)}`;
    }

    // Hovered glow pulse
    if (i === hoverIdx && !o.selected) {
      o.mat.emissiveIntensity = .4 + Math.sin(T * 6) * .2;
    }
  });

  // Cursor glow
  const cv = handVis ? (.55 + Math.sin(T * 6) * .2) : 0;
  curMat.opacity   = cv;
  pulseMat.opacity = cv * .5;
  const ps = 1 + Math.sin(T * 6) * .35;
  pulseRing.scale.setScalar(ps);

  // Grid subtle pulse
  grid.material.opacity = .35 + Math.sin(T * .5) * .1;

  // FPS
  frameN++;
  const now = performance.now();
  if (now - lastFpsT >= 1000) {
    fpsVal = Math.round(frameN * 1000 / (now - lastFpsT));
    frameN = 0; lastFpsT = now;
    const hstate = handVis
      ? `<span style="color:#7fff00">DETECTED</span>`
      : `<span style="color:#333">SCANNING…</span>`;
    document.getElementById('hudInfo').innerHTML =
      `GESTURE: <span>${gesture}</span> &nbsp;|&nbsp; FPS: <span>${fpsVal}</span><br>HAND: ${hstate}`;
  }

  renderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  handCanvas.width  = window.innerWidth;
  handCanvas.height = window.innerHeight;
});

// ── Custom cursor ──
document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX + 'px';
  c.style.top  = e.clientY + 'px';
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  const k = e.key;
  if (k >= '1' && k <= '6') selectObj(parseInt(k) - 1);
  if (k.toLowerCase() === 'r') resetSelected();
});
</script>
