<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo dõi lớp học</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; padding: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: #1a1d27; border-radius: 10px; padding: 12px 14px; border: 1px solid #2a2d3a; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .legend { display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #999; }
  .dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  #statusBadge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #1a1d27; color: #888; border: 1px solid #2a2d3a; }
  #personGrid {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 78px; margin-bottom: 14px;
    padding: 12px; background: #1a1d27;
    border-radius: 12px; border: 1px solid #2a2d3a;
    align-content: flex-start;
  }
  .person-sq {
    width: 58px; height: 58px; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 600; color: #fff; cursor: default;
    transition: background 0.15s ease, transform 0.1s ease;
    position: relative; flex-shrink: 0;
  }
  .person-sq .num { font-size: 18px; line-height: 1; }
  .person-sq .lbl { font-size: 9px; opacity: 0.85; margin-top: 3px; letter-spacing: 0.3px; }
  .person-sq.talking { animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.75; } }
  #emptyMsg { color: #555; font-size: 13px; margin: auto; width: 100%; text-align: center; }
  .cam-wrap {
    border-radius: 12px; overflow: hidden;
    border: 1px solid #2a2d3a; position: relative;
    background: #000; min-height: 200px;
  }
  #video { width: 100%; height: auto; display: block; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #camCover {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(0,0,0,0.85);
  }
  #camCoverMsg { color: #aaa; font-size: 14px; text-align: center; max-width: 260px; line-height: 1.5; }
  #startBtn {
    background: #2563eb; color: #fff; border: none; border-radius: 8px;
    padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 500;
  }
  #startBtn:hover { background: #1d4ed8; }
  #startBtn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
  #perfInfo { font-size: 11px; color: #555; text-align: right; margin-top: 6px; }
  .title { font-size: 17px; font-weight: 600; color: #e0e0e0; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .badge-live { background: #ef4444; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; display: none; }
</style>
</head>
<body>

<div class="title">
  Theo dõi lớp học
  <span class="badge-live" id="liveBadge">LIVE</span>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Phát hiện</div>
    <div class="stat-val" id="cntTotal" style="color:#e0e0e0">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Đang nói</div>
    <div class="stat-val" id="cntTalking" style="color:#ef4444">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Im lặng</div>
    <div class="stat-val" id="cntSilent" style="color:#22c55e">0</div>
  </div>
</div>

<div class="header-row">
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#22c55e"></div>Im lặng</div>
    <div class="legend-item"><div class="dot" style="background:#ef4444"></div>Đang nói</div>
  </div>
  <span id="statusBadge">tải model AI...</span>
</div>

<div id="personGrid">
  <div id="emptyMsg">chưa phát hiện ai trong khung hình</div>
</div>

<div class="cam-wrap">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="camCover">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
      <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    <p id="camCoverMsg">Nhấn nút bên dưới để bật camera</p>
    <button id="startBtn" onclick="startCamera()" disabled>Bật Camera</button>
  </div>
</div>

<div id="perfInfo"></div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
(async () => {
  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';

  const video    = document.getElementById('video');
  const canvas   = document.getElementById('overlay');
  const ctx      = canvas.getContext('2d');
  const grid     = document.getElementById('personGrid');
  const emptyMsg = document.getElementById('emptyMsg');
  const camCover = document.getElementById('camCover');
  const camMsg   = document.getElementById('camCoverMsg');
  const startBtn = document.getElementById('startBtn');
  const badge    = document.getElementById('statusBadge');
  const liveBadge= document.getElementById('liveBadge');
  const cntTotal   = document.getElementById('cntTotal');
  const cntTalking = document.getElementById('cntTalking');
  const cntSilent  = document.getElementById('cntSilent');
  const perfInfo   = document.getElementById('perfInfo');

  let squares = [];
  let running = false;
  let frameCount = 0;
  let lastPerfT = 0;

  // ── Load models ──────────────────────────────────────────
  try {
    badge.textContent = 'đang tải...';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
    ]);
    badge.textContent = 'sẵn sàng';
    badge.style.background = '#14532d';
    badge.style.color = '#86efac';
    badge.style.borderColor = '#166534';
    camMsg.textContent = 'Nhấn nút bên dưới để bật camera';
    startBtn.disabled = false;
  } catch (e) {
    badge.textContent = 'lỗi model';
    badge.style.color = '#f87171';
    camMsg.textContent = 'Lỗi tải AI model. Thử tải lại trang.';
    console.error(e);
    return;
  }

  // ── Camera start ─────────────────────────────────────────
  window.startCamera = async function () {
    startBtn.disabled = true;
    camMsg.textContent = 'Đang bật camera...';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await new Promise(r => { video.onloadedmetadata = r; });
      await video.play();

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      camCover.style.display = 'none';
      liveBadge.style.display = '';
      badge.textContent = 'đang chạy';
      running = true;
      detectLoop();
    } catch (e) {
      startBtn.disabled = false;
      camMsg.textContent =
        e.name === 'NotAllowedError'
          ? 'Bị từ chối quyền camera.\nVào cài đặt trình duyệt → Cho phép camera.'
          : 'Lỗi: ' + e.message;
      console.error(e);
    }
  };

  // ── Mouth-open check (68-landmark model) ─────────────────
  function isMouthOpen(lm) {
    const p = lm.positions;
    // 62 = upper-center inner lip, 66 = lower-center inner lip
    const h = Math.abs(p[66].y - p[62].y);
    // 48 = left outer corner, 54 = right outer corner
    const w = Math.abs(p[54].x - p[48].x);
    return w > 0 && (h / w) > 0.28;
  }

  // ── Update squares grid ───────────────────────────────────
  function updateGrid(faces) {
    const n = faces.length;
    emptyMsg.style.display = n === 0 ? '' : 'none';

    while (squares.length > n) squares.pop().remove();
    while (squares.length < n) {
      const sq = document.createElement('div');
      sq.className = 'person-sq';
      sq.innerHTML = '<span class="num"></span><span class="lbl"></span>';
      grid.appendChild(sq);
      squares.push(sq);
    }

    let talking = 0;
    faces.forEach((f, i) => {
      const open = isMouthOpen(f.landmarks);
      if (open) talking++;
      squares[i].style.background = open ? '#dc2626' : '#16a34a';
      squares[i].classList.toggle('talking', open);
      squares[i].querySelector('.num').textContent = i + 1;
      squares[i].querySelector('.lbl').textContent = open ? 'NÓI' : '';
    });

    cntTotal.textContent   = n;
    cntTalking.textContent = talking;
    cntSilent.textContent  = n - talking;
  }

  // ── Draw bounding boxes on canvas ─────────────────────────
  function drawBoxes(faces) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    faces.forEach((f, i) => {
      const b    = f.detection.box;
      const open = isMouthOpen(f.landmarks);
      const col  = open ? '#ef4444' : '#22c55e';

      // Box
      ctx.strokeStyle = col;
      ctx.lineWidth   = 2.5;
      ctx.strokeRect(b.x, b.y, b.width, b.height);

      // Number badge
      ctx.fillStyle = col;
      const lbl = String(i + 1);
      const bw  = Math.max(26, lbl.length * 10 + 12);
      ctx.beginPath();
      ctx.roundRect(b.x, b.y - 24, bw, 22, 4);
      ctx.fill();

      ctx.fillStyle   = '#fff';
      ctx.font        = 'bold 13px system-ui, sans-serif';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(lbl, b.x + bw / 2, b.y - 13);

      // "NÓI" label if talking
      if (open) {
        ctx.font      = 'bold 11px system-ui, sans-serif';
        ctx.fillStyle = '#ef4444';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('◆ NÓI', b.x + b.width / 2, b.y + b.height + 4);
      }
    });
  }

  // ── Detection loop ────────────────────────────────────────
  async function detectLoop() {
    if (!running) return;
    try {
      const dets = await faceapi
        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.45 }))
        .withFaceLandmarks(true);

      // Sort left → right for stable square order
      dets.sort((a, b) => a.detection.box.x - b.detection.box.x);

      updateGrid(dets);
      drawBoxes(dets);

      frameCount++;
      const now = performance.now();
      if (now - lastPerfT > 2000) {
        const fps = (frameCount * 1000 / (now - lastPerfT)).toFixed(1);
        perfInfo.textContent = `${fps} fps · ${dets.length} khuôn mặt`;
        frameCount = 0;
        lastPerfT  = now;
      }
    } catch (e) {
      console.error('Detection error:', e);
    }
    await new Promise(r => setTimeout(r, 60));
    requestAnimationFrame(detectLoop);
  }
})();
</script>
</body>
</html>
